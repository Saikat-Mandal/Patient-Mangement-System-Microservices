syntax = "proto3";
//service request and response files are splitted into diff files
option java_multiple_files = true;

//all code generation hits in package call billing
option java_package = "billing";

service BillingService{
  rpc CreateBillingAccount (BillingRequest) returns (BillingResponse);
}

message BillingRequest{
  string patientId = 1;
  string name = 2;
  string email = 3;
}

message BillingResponse{
  string accountId = 1;
  string status = 2;
}