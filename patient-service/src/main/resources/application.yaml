  sql:
    init:
      mode: always
  datasource:
    url: jdbc:postgresql://localhost:5432/patientdb
    username: admin
    password: admin
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
logging:
  level:
    org:
      springframework:
        :security: DEBUG
        :web : DEBUG
server:
  port: 4000 